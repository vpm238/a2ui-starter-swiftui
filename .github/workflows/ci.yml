name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Picked: $latest"
          sudo xcode-select -switch "$latest/Contents/Developer"
          swift --version
          xcodebuild -version
      - name: Build
        run: |
          set +e
          swift build -v 2>&1 | tee build.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then
            echo "=== BUILD FAILED — last 120 lines ==="
            tail -120 build.log
            exit $rc
          fi
